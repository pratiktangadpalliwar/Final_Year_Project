      AWS_REGION:           "us-east-1"
      DP_EPSILON:           "5.0"
      DP_DELTA:             "1e-5"
      DP_CLIP_NORM:         "0.5"
      LOCAL_EPOCHS:         "10"
      BATCH_SIZE:           "512"
      LEARNING_RATE:        "0.001"
      INPUT_DIM:            "19"
      POLL_INTERVAL_SECONDS:"10"
    volumes:
      - bank02-input:/data/input
      - fl-storage:/tmp/fl-shared
    restart: unless-stopped

  # ── Bank 03 — Heartland (fault: network_partition) ───────────────
