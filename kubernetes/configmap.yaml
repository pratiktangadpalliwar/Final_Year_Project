---
apiVersion: v1
kind: ConfigMap
metadata:
  name: fl-config
  namespace: federated-learning
data:
  # FL Server settings
  MIN_NODES:            "3"
  MAX_ROUNDS:           "50"
  QUORUM_PCT:           "0.6"
  ROLLBACK_THRESHOLD:   "0.05"
  ROUND_TIMEOUT:        "300"

  # Model architecture
  INPUT_DIM:            "19"
  HIDDEN_DIMS:          "64,32,16"

  # Differential Privacy
  DP_EPSILON:           "5.0"
  DP_DELTA:             "1e-5"
  DP_CLIP_NORM:         "0.5"

  # Training
  LOCAL_EPOCHS:         "10"
  BATCH_SIZE:           "512"
  LEARNING_RATE:        "0.001"

  # AWS
  AWS_REGION:           "us-east-1"
  S3_BUCKET:            "fl-models-prod"
  DYNAMODB_TABLE:       "fl-rounds"

  # Storage mode (set to "false" for production AWS)
  USE_LOCAL_STORAGE:    "false"

  # Client settings
  POLL_INTERVAL_SECONDS: "10"
  FL_SERVER_URL:         "http://fl-server-service:8080"
