###############################################################################
# .github/workflows/build-client.yml
# Builds and pushes FL Bank Client Docker image to Docker Hub
###############################################################################

name: Build & Push FL Client

on:
  push:
    branches: [main]
    paths:    [client/**]
  pull_request:
    branches: [main]
    paths:    [client/**]
  workflow_dispatch:

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/fl-client

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags:   |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:   ./client
          file:      ./client/Dockerfile
          push:      ${{ github.event_name != 'pull_request' }}
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

  # ── Rolling update of all bank nodes after client image update ───
  deploy-clients:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Rolling restart all bank nodes
        run: |
          kubectl get deployments -n federated-learning \
            -l app=fl-client \
            -o name | \
          xargs -I{} kubectl rollout restart {} \
            -n federated-learning

      - name: Wait for rollout
        run: |
          kubectl get deployments -n federated-learning \
            -l app=fl-client \
            -o name | \
          xargs -I{} kubectl rollout status {} \
            -n federated-learning --timeout=3m
