###############################################################################
# .github/workflows/build-server.yml
# Builds and pushes FL Server Docker image to Docker Hub
# Triggers: push to main with changes in server/
###############################################################################

name: Build & Push FL Server

on:
  push:
    branches: [main]
    paths:    [server/**]
  pull_request:
    branches: [main]
    paths:    [server/**]
  workflow_dispatch:    # manual trigger

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/fl-server

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:

      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags:   |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context:   ./server
          file:      ./server/Dockerfile
          push:      ${{ github.event_name != 'pull_request' }}
          tags:      ${{ steps.meta.outputs.tags }}
          labels:    ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to:   type=gha,mode=max

      - name: Image digest
        run: echo "Pushed ${{ steps.meta.outputs.tags }}"

  # ── Auto-deploy to EKS on main push ─────────────────────────────
  deploy:
    needs: build-and-push
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure AWS credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id:     ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region:            ${{ secrets.AWS_REGION }}

      - name: Update kubeconfig
        run: |
          aws eks update-kubeconfig \
            --name ${{ secrets.EKS_CLUSTER_NAME }} \
            --region ${{ secrets.AWS_REGION }}

      - name: Deploy via Helm
        run: |
          helm upgrade --install fl-project ./helm \
            --namespace federated-learning \
            --create-namespace \
            --set global.dockerUsername=${{ secrets.DOCKERHUB_USERNAME }} \
            --set global.imageTag=sha-${{ github.sha }} \
            --set global.awsAccountId=${{ secrets.AWS_ACCOUNT_ID }} \
            --set aws.s3Bucket=${{ secrets.S3_BUCKET }} \
            --wait \
            --timeout 5m

      - name: Verify rollout
        run: |
          kubectl rollout status deployment/fl-server \
            -n federated-learning --timeout=3m
